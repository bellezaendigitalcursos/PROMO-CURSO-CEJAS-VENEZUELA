<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Cejas Maquilladas Pro</title>
<style>
  :root{
    --rosa-fuerte:#d63b7e;
    --rosa-suave:#fbdde9;
    --blanco:#ffffff;
    --texto:#3a1f2b;
    --verde:#22c55e;
    --verde-oscuro:#16a34a;
    --dorado:#f4c542;
  }
  *{box-sizing:border-box;margin:0;padding:0;}
  body{
    font-family:'Helvetica Neue',Arial,sans-serif;
    background:linear-gradient(180deg,var(--blanco) 0%, var(--rosa-suave) 45%, var(--rosa-fuerte) 100%);
    color:var(--texto);
    min-height:100vh;
    display:flex;
    justify-content:center;
    -webkit-font-smoothing:antialiased;
  }
  .page{
    width:100%;
    max-width:480px;
    min-height:100vh;
    background:var(--blanco);
    box-shadow:0 0 40px rgba(214,59,126,0.15);
    display:flex;
    flex-direction:column;
  }
  .hero-wrap{
    position:relative;
    width:100%;
    aspect-ratio:1/1;
    overflow:hidden;
  }
  .hero-wrap img{
    width:100%;
    height:100%;
    object-fit:cover;
    display:block;
  }
  .content{
    padding:24px 24px 28px;
    text-align:center;
  }
  .price-card{
    background:var(--rosa-suave);
    border:1px solid #f6c4dc;
    border-radius:16px;
    padding:16px 18px;
  }
  .price-badge{
    display:inline-block;
    background:var(--dorado);
    color:#5a4200;
    font-size:11px;
    font-weight:800;
    letter-spacing:1px;
    text-transform:uppercase;
    padding:4px 10px;
    border-radius:20px;
    margin-bottom:10px;
  }
  .price-row{
    display:flex;
    align-items:baseline;
    justify-content:center;
    gap:10px;
    flex-wrap:wrap;
  }
  .price-now{
    font-size:30px;
    font-weight:800;
    color:var(--rosa-fuerte);
  }
  .price-old{
    font-size:17px;
    color:#a98b97;
    text-decoration:line-through;
  }
  .timer-note{
    font-size:12.5px;
    font-weight:700;
    color:#b8275f;
    margin-top:8px;
    letter-spacing:0.3px;
  }
  .cta{
    display:flex;
    align-items:center;
    justify-content:center;
    gap:10px;
    background:var(--verde);
    color:var(--blanco);
    font-size:17px;
    font-weight:800;
    text-decoration:none;
    padding:16px 20px;
    border-radius:14px;
    box-shadow:0 8px 20px rgba(34,197,94,0.35);
    transition:transform 0.15s ease, box-shadow 0.15s ease;
    margin-bottom:22px;
  }
  .cta:active{transform:scale(0.97);}
  .cta svg{width:22px;height:22px;flex-shrink:0;}
  footer{
    text-align:center;
    font-size:11.5px;
    color:#c79bab;
    padding:18px 0 10px;
  }
</style>
</head>
